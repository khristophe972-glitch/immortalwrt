name: Build ImmortalWrt MT6000

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget llvm

      - name: Clone sources
        run: |
          git clone --branch openwrt-25.12 --single-branch https://github.com/khristophe972-glitch/immortalwrt.git openwrt
          cd openwrt
          git log --oneline -5

      - name: Update feeds
        run: |
          cd openwrt
          for i in 1 2 3; do
            ./scripts/feeds update -a && break
            echo "Retry $i..."
            sleep 30
          done
          ./scripts/feeds install -a

      - name: Import config
        run: |
          cd openwrt
          wget https://downloads.immortalwrt.org/snapshots/targets/mediatek/filogic/config.buildinfo -O .config
          echo "CONFIG_PACKAGE_kmod-nft-fullcone=y" >> .config
          echo "CONFIG_PACKAGE_kmod-sched=y" >> .config
          echo "CONFIG_PACKAGE_kmod-sched-cake=y" >> .config
          echo "CONFIG_PACKAGE_kmod-sched-core=y" >> .config
          echo "CONFIG_PACKAGE_kmod-sched-prio=y" >> .config
          echo "CONFIG_PACKAGE_kmod-sched-ctinfo=y" >> .config
          echo "CONFIG_PACKAGE_kmod-sched-bpf=y" >> .config
          echo "CONFIG_PACKAGE_kmod-sched-flower=y" >> .config
          echo "CONFIG_PACKAGE_kmod-sched-act-vlan=y" >> .config
          echo "CONFIG_PACKAGE_kmod-sched-red=y" >> .config
          echo "CONFIG_PACKAGE_kmod-ifb=y" >> .config
          echo "CONFIG_PACKAGE_kmod-netem=y" >> .config
          echo "CONFIG_PACKAGE_kmod-veth=y" >> .config
          echo "CONFIG_PACKAGE_sqm-scripts=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-sqm=y" >> .config
          echo "CONFIG_PACKAGE_tc-full=y" >> .config
          echo "CONFIG_PACKAGE_ip-full=y" >> .config
          echo "CONFIG_PACKAGE_iptables-nft=y" >> .config
          echo "CONFIG_PACKAGE_iptables-mod-ipopt=y" >> .config
          echo "CONFIG_PACKAGE_iptables-mod-conntrack-extra=y" >> .config
          echo "CONFIG_PACKAGE_iptables-mod-extra=y" >> .config
          echo "CONFIG_PACKAGE_iptables-mod-filter=y" >> .config
          echo "CONFIG_PACKAGE_ip6tables-nft=y" >> .config
          echo "CONFIG_PACKAGE_miniupnpd-nftables=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-upnp=y" >> .config
          echo "CONFIG_PACKAGE_tcpdump=y" >> .config
          echo "CONFIG_PACKAGE_iperf3=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          echo "CONFIG_PACKAGE_bind-dig=y" >> .config
          echo "CONFIG_PACKAGE_mtr=y" >> .config
          echo "CONFIG_PACKAGE_ethtool-full=y" >> .config
          echo "CONFIG_PACKAGE_irqbalance=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-statistics=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-nlbwmon=y" >> .config
          echo "CONFIG_PACKAGE_nano=y" >> .config
          echo "CONFIG_PACKAGE_jq=y" >> .config
          echo "CONFIG_PACKAGE_htop=y" >> .config
          echo "CONFIG_PACKAGE_bash=y" >> .config
          echo "CONFIG_PACKAGE_diffutils=y" >> .config
          echo "CONFIG_PACKAGE_less=y" >> .config
          echo "CONFIG_PACKAGE_luci-lib-jsonc=y" >> .config
          echo "CONFIG_PACKAGE_lua=y" >> .config
          echo "CONFIG_PACKAGE_coreutils-sleep=y" >> .config
          echo "CONFIG_ALL_KMODS=y" >> .config
          echo "CONFIG_ALL_NONSHARED=y" >> .config
          make defconfig

      - name: Download packages
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) IGNORE_ERRORS=m || make -j1 V=s IGNORE_ERRORS=m

      - name: Debug build outputs
        if: always()
        run: |
          cd openwrt
          echo "=== Firmware files ==="
          find bin/ -name "*sysupgrade*" -o -name "*factory*" 2>/dev/null
          echo "=== APK files count ==="
          find bin/ -name "*.apk" 2>/dev/null | wc -l
          echo "=== bin/ total size ==="
          du -sh bin/
          echo "=== Disk space ==="
          df -h

      - name: Prepare package repository
        if: always()
        run: |
          cd openwrt
          mkdir -p /tmp/pkg-repo
          cp -a bin/* /tmp/pkg-repo/ 2>/dev/null || true
          echo "=== APK count ==="
          find /tmp/pkg-repo -name "*.apk" 2>/dev/null | wc -l
          du -sh /tmp/pkg-repo/

      - name: Deploy to gh-pages
        if: always()
        run: |
          cd /tmp/pkg-repo
          FILE_COUNT=$(find . -type f | wc -l)
          echo "Files to deploy: $FILE_COUNT"
          if [ "$FILE_COUNT" -gt 0 ]; then
            git init
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git checkout -b gh-pages
            git add .
            git commit -m "Package repo $(date -u +%Y-%m-%d_%H%M%S)"
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git push -f origin gh-pages
          fi

      - name: Upload firmware artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-mt6000-build
          path: openwrt/bin/
